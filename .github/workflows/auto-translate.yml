name: Auto Translate to Chinese

on:
  push:
    branches:
      - main
    paths:
      - '**.md'
      - '**.ts'
      - '**.js'
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create translate script with Azure API
        run: |
          mkdir -p scripts
          cat > scripts/translate.js << 'EOF'
          import fs from 'fs';
          import path from 'path';
          import https from 'https';

          const AZURE_KEY = process.env.AZURE_TRANSLATOR_KEY;
          const AZURE_ENDPOINT = process.env.AZURE_TRANSLATOR_ENDPOINT;
          const AZURE_REGION = process.env.AZURE_TRANSLATOR_REGION;

          // 本地字典作为备选（如果 API 失败）
          const localTranslationMap = {
            'Welcome': '欢迎',
            'Introduction': '介绍',
            'Course Setup': '课程设置',
            'LangChain': 'LangChain',
            'Chat Models': '聊天模型',
          };

          async function translateWithAzure(text) {
            console.log('Calling Azure Translate...');
            console.log('Endpoint:', AZURE_ENDPOINT);
            console.log('Region:', AZURE_REGION);
            return new Promise((resolve, reject) => {
              if (!AZURE_KEY || !AZURE_ENDPOINT) {
                console.warn('⚠️ Azure credentials not found, using local dictionary');
                resolve(text);
                return;
              }

              try {
                const body = JSON.stringify([{ Text: text }]);
                
                const options = {
                  hostname: new URL(AZURE_ENDPOINT).hostname,
                  path: '/translate?api-version=3.0&from=en&to=zh-Hans',
                  method: 'POST',
                  headers: {
                    'Ocp-Apim-Subscription-Key': AZURE_KEY,
                    'Ocp-Apim-Subscription-Region': AZURE_REGION,
                    'Content-Type': 'application/json'
                  }
                };

                const req = https.request(options, (res) => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => {
                    try {
                      console.log('Azure raw response:', data);
                      const result = JSON.parse(data);
                      if (result[0] && result[0].translations && result[0].translations[0]) {
                        resolve(result[0].translations[0].text);
                      } else {
                        resolve(text);
                      }
                    } catch (err) {
                      console.error('Failed to parse Azure response:', err.message);
                      resolve(text);
                    }
                  });
                });

                req.on('error', (err) => {
                  console.error('Azure API error:', err.message);
                  // resolve(text);
                  reject(err); // 不要 resolve
                });

                req.write(body);
                req.end();
              } catch (err) {
                console.error('Error calling Azure:', err.message);
                resolve(text);
              }
            });
          }

          function translateWithLocalDict(text) {
            let result = text;
            for (const [eng, chs] of Object.entries(localTranslationMap)) {
              const regex = new RegExp('\\b' + eng + '\\b', 'g');
              result = result.replace(regex, chs);
            }
            return result;
          }

          async function translateMarkdown(content) {
            let result = content;
            
            // 保护代码块
            const codeBlockRegex = /\`\`\`[\s\S]*?\`\`\`/g;
            const codeBlocks = [];
            result = result.replace(codeBlockRegex, (match) => {
              codeBlocks.push(match);
              return `__CODE_BLOCK_${codeBlocks.length - 1}__`;
            });

            // 保护内联代码
            const inlineCodeRegex = /\`[^\`]+\`/g;
            const inlineCodes = [];
            result = result.replace(inlineCodeRegex, (match) => {
              inlineCodes.push(match);
              return `__INLINE_CODE_${inlineCodes.length - 1}__`;
            });

            // 分段翻译（每段限制长度以避免 API 超时）
            const paragraphs = result.split('\n\n');
            const translatedParagraphs = [];

            for (const para of paragraphs) {
              if (para.trim().length === 0) {
                translatedParagraphs.push(para);
                continue;
              }

              // 尝试使用 Azure API，如果失败则使用本地字典
              let translated = para;
              if (AZURE_KEY) {
                try {
                  translated = await translateWithAzure(para);
                } catch (err) {
                  console.warn('Azure translation failed, using local dictionary:', err.message);
                  translated = translateWithLocalDict(para);
                }
              } else {
                translated = translateWithLocalDict(para);
              }

              translatedParagraphs.push(translated);
            }

            result = translatedParagraphs.join('\n\n');

            // 恢复代码块
            result = result.replace(/__CODE_BLOCK_(\d+)__/g, (match, index) => {
              return codeBlocks[parseInt(index)];
            });

            // 恢复内联代码
            result = result.replace(/__INLINE_CODE_(\d+)__/g, (match, index) => {
              return inlineCodes[parseInt(index)];
            });

            return result;
          }

          async function processDir(dir) {
            try {
              const files = fs.readdirSync(dir);
              for (const file of files) {
                const fullPath = path.join(dir, file);
                const stat = fs.statSync(fullPath);
                if (stat.isDirectory() && !file.startsWith('.') && file !== 'node_modules') {
                  await processDir(fullPath);
                } else if (file.endsWith('.md') && !file.endsWith('.zh-CN.md')) {
                  try {
                    console.log('Processing:', fullPath);
                    const content = fs.readFileSync(fullPath, 'utf8');
                    const translated = await translateMarkdown(content);
                    const outPath = fullPath.replace('.md', '.zh-CN.md');
                    fs.writeFileSync(outPath, translated, 'utf8');
                    console.log('✅ Translated:', outPath);
                  } catch (err) {
                    console.error('Error processing', fullPath, err.message);
                  }
                }
              }
            } catch (err) {
              console.error('Error in processDir', dir, err.message);
            }
          }

          console.log('🚀 Starting translation with Azure Translator API...');
          console.log('Using Azure endpoint:', AZURE_ENDPOINT ? '✅ Configured' : '❌ Not configured');
          await processDir('.');
          console.log('✅ Translation complete!');
          EOF

      - name: Debug env
        run: |
          echo "KEY length: ${#AZURE_TRANSLATOR_KEY}"
          echo "ENDPOINT: $AZURE_TRANSLATOR_ENDPOINT"
    
      - name: Run translation script
        env:
          AZURE_TRANSLATOR_KEY: ${{ secrets.AZURE_TRANSLATOR_KEY }}
          AZURE_TRANSLATOR_ENDPOINT: ${{ secrets.AZURE_TRANSLATOR_ENDPOINT }}
          AZURE_TRANSLATOR_REGION: 'southeastasia' # 在这里明确指定区域
        run: node scripts/translate.js

      - name: Check for generated files
        run: |
          echo "Generated Chinese files:"
          find . -name "*.zh-CN.md" -type f | head -20

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'docs: add Chinese translations'
          title: '🌐 Chinese Translations'
          body: |
            ## 自动翻译 - 中文文档
            
            本 PR 包含使用 Azure Translator API 自动生成的中文翻译。
            
            - ✅ README 文件已翻译
            - ✅ 课程材料已翻译
            - ✅ 支持整句翻译
            
            请审核翻译的准确性。
          branch: translations/zh-CN
          delete-branch: false
